<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的徒步足迹 - 保持探索世界的心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts-gl@2.0.9/dist/echarts-gl.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <style>
        /* --- 核心变量 (莫兰迪高级户外主题) --- */
        :root {
            --primary-green: #8fa486; 
            --bg-space: #030712; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-glass: rgba(255, 255, 255, 0.03); 
            --border-glow: rgba(255, 255, 255, 0.08); 
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            margin: 0; background-color: var(--bg-space); color: var(--text-main); overflow-x: hidden;
            background-image:
                radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 80px 120px, rgba(255,255,255,0.4), rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 150px 40px, rgba(255,255,255,0.9), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 220px 180px, rgba(255,255,255,0.3), rgba(0,0,0,0)),
                radial-gradient(1px 1px at 280px 90px, rgba(255,255,255,0.6), rgba(0,0,0,0));
            background-repeat: repeat; background-size: 300px 300px;
        }

        /* ================= 第一部分：太空探索起始页 ================= */
        #intro-screen {
            position: fixed; inset: 0; z-index: 9999; display: flex; justify-content: center;
            background-color: #000; overflow: hidden; 
        }
        .intro-bg {
            position: absolute; inset: 0;
            background-image: url('photos/intro-bg.jpg'); 
            background-size: cover; background-position: center;
            transform-origin: 75% 55%; 
            transition: transform 3.5s cubic-bezier(0.64, 0, 0.2, 1), filter 3s ease;
        }
        .zoom-into-asia { 
            transform: scale(25) translate(-5%, 5%); 
            filter: blur(8px) brightness(1.5);
        }
        .intro-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%);
            transition: opacity 1s ease;
        }
        .explore-btn {
            position: absolute; top: 33vh; z-index: 10000;
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 16px 32px;
            border-radius: 50px; font-size: 1.1rem; letter-spacing: 3px; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: all 0.3s ease;
            animation: pulse-glow 2.5s infinite;
        }
        .explore-btn:active { transform: scale(0.95); }
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
            50% { box-shadow: 0 0 25px rgba(255, 255, 255, 0.6); }
        }
        .fade-out { opacity: 0 !important; pointer-events: none; }

        /* ====== 穿云过渡层（第一阶段：进入云层）====== */
        #cloud-transition {
            position: fixed; inset: 0; z-index: 10005; pointer-events: none;
            background: radial-gradient(circle at center, rgba(240, 248, 255, 1) 0%, rgba(143, 164, 134, 0.5) 60%, rgba(0,0,0,0) 100%);
            opacity: 0; transform: scale(0.2); 
            transition: opacity 1s ease-in, transform 1.5s ease-in;
        }
        #cloud-transition.enter-clouds {
            opacity: 1; transform: scale(2);
        }
        /* 快速淡出，把舞台交给液态玻璃层 */
        #cloud-transition.leave-clouds {
            opacity: 0;
            transition: opacity 0.45s ease-out;
        }

        /* ====== 液态玻璃虹膜过渡层（第二阶段）====== */
        #liquid-canvas {
            position: fixed;
            inset: 0;
            z-index: 10006;
            pointer-events: none;
            opacity: 0;
        }

        /* ================= 第二部分：主页面 ================= */
        #main-wrapper {
            opacity: 0; transform: translateY(30px);
            transition: opacity 2s ease-out, transform 2s cubic-bezier(0.2, 0.8, 0.2, 1);
            pointer-events: none; min-height: 100vh;
        }
        #main-wrapper.active { opacity: 1; transform: translateY(0); pointer-events: auto; }

        #hologram-section {
            position: relative; width: 100%;
            height: 520px;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            overflow: hidden; padding-top: 2rem;
            background: linear-gradient(180deg, transparent 0%, rgba(3,7,18,0.95) 85%, rgba(3,7,18,1) 100%);
        }
        
        header { position: relative; z-index: 10; text-align: center; }
        header h1 { 
            margin: 0; color: var(--primary-green); letter-spacing: 2px; 
            text-shadow: 0 0 20px rgba(143, 164, 134, 0.3); line-height: 1.5; font-size: 1.8rem;
        }

        .map-3d-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #china-3d-map {
            width: 100%;
            height: 100%;
        }

        /* 统计与卡片区 */
        .stats-banner {
            display: flex; justify-content: center; gap: 4rem; padding: 1rem 2rem 2rem;
            border-bottom: 1px solid var(--border-glow); margin-bottom: 3rem;
            position: relative; z-index: 10;
        }
        .stat-item { text-align: center; }
        .stat-item h3 { margin: 0; color: var(--text-main); font-size: 2.2rem; font-weight: 300;}
        .stat-item p { margin: 5px 0 0; font-size: 0.85rem; color: var(--primary-green); letter-spacing: 1px;}

        .trips-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem;
            max-width: 1200px; margin: 0 auto; padding: 0 1rem 4rem; position: relative; z-index: 10;
        }
        .trip-card {
            background: var(--card-glass); border: 1px solid var(--border-glow); border-radius: 16px;
            overflow: hidden; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: all 0.4s ease; cursor: pointer;
        }
        .trip-card:hover { 
            transform: translateY(-10px); border-color: rgba(143, 164, 134, 0.4); 
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(143, 164, 134, 0.15); 
        }
        .trip-image { width: 100%; height: 220px; object-fit: cover; }
        .trip-content { padding: 1.5rem; }
        .trip-title { margin: 0 0 0.5rem; font-size: 1.4rem; color: var(--text-main); font-weight: 600;}
        .trip-meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.5rem; letter-spacing: 1px;}
        .trip-stats {
            display: flex; justify-content: space-between; border-top: 1px solid var(--border-glow); padding-top: 1rem;
            font-size: 0.9rem; color: var(--primary-green);
        }

        #error-msg { text-align: center; color: #ef4444; padding: 2rem; }

        /* ================= 第三部分：弹窗样式 ================= */
        .modal {
            display: none; position: fixed; z-index: 10000; left: 0; top: 0;
            width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); overflow-y: auto;
            backdrop-filter: blur(8px); opacity: 0; transition: opacity 0.3s ease;
        }
        .modal.show { opacity: 1; }
        .modal-content {
            background-color: #0b1120; margin: 5% auto; padding: 3rem; width: 90%; max-width: 850px;
            border-radius: 24px; position: relative; border: 1px solid rgba(255,255,255,0.1);
            transform: translateY(20px); transition: transform 0.3s ease;
        }
        .modal.show .modal-content { transform: translateY(0); }
        .close-btn { position: absolute; right: 30px; top: 20px; font-size: 2.5rem; cursor: pointer; color: var(--text-muted);}
        .close-btn:hover { color: #fff; }
        .photo-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; margin-top: 1rem; }
        .gallery-img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; border: 1px solid var(--border-glow);}

        /* ================= 手机端适配 ================= */
        @media (max-width: 768px) {
            header h1 { font-size: 1.4rem; }
            .explore-btn { top: 33vh; padding: 15px 30px; font-size: 1rem; }
            #hologram-section { height: 400px; }
            .stats-banner { gap: 2rem; padding: 1rem; flex-wrap: wrap; margin-top: -10px;}
            .modal-content { width: 100%; margin: 0; min-height: 100vh; border-radius: 0; padding: 2rem 1.2rem; } 
            .close-btn { right: 20px; top: 15px; }
            #modal-detail-body > div:nth-child(2) { grid-template-columns: 1fr 1fr !important; gap: 12px !important; }
            .photo-gallery { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
            #real-map { height: 300px !important; }
        }
    </style>
</head>
<body>

    <!-- 第一阶段：穿云过渡层 -->
    <div id="cloud-transition"></div>

    <!-- 第二阶段：液态玻璃虹膜过渡层 -->
    <canvas id="liquid-canvas"></canvas>

    <div id="intro-screen">
        <div class="intro-bg" id="intro-bg"></div>
        <div class="intro-overlay" id="intro-overlay"></div>
        <button class="explore-btn" id="explore-btn">保持探索世界的心</button>
    </div>

    <div id="main-wrapper">
        <div id="hologram-section">
            <header>
                <h1>
                    <i class="fas fa-satellite"></i> 爱并非存在于相互的凝视<br>而是两个人一起望向外在的同一方向
                </h1>
            </header>
            <div class="map-3d-container">
                <div id="china-3d-map"></div>
            </div>
        </div>

        <div class="stats-banner">
            <div class="stat-item"><h3 id="total-trips">-</h3><p>探索轨迹</p></div>
            <div class="stat-item"><h3 id="total-dist">-</h3><p>累计里程 (KM)</p></div>
        </div>
        <div id="error-msg"></div>
        <main class="trips-grid" id="trips-grid"></main>
    </div>

    <div id="trip-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modal-detail-body"></div>
        </div>
    </div>

    <script>
        let allTrips = [];
        let echartMap = null;
        let visitedProvincesMapData = [];
        let mapGeoReady = false;

        /* ================================================================
         * 液态玻璃虹膜动画引擎
         * 效果：iOS液态玻璃圆环由外向内收缩，波浪状液态边缘，最终揭示3D地图
         * ================================================================ */
        function playLiquidIrisClose() {
            const canvas = document.getElementById('liquid-canvas');
            const ctx = canvas.getContext('2d');

            // 适配屏幕尺寸
            canvas.width  = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.opacity = '1';

            const W = canvas.width;
            const H = canvas.height;
            const cx = W / 2;
            const cy = H / 2;
            // 对角线半径，确保覆盖整个画布四角
            const maxR = Math.sqrt(cx * cx + cy * cy) + 30;

            const DURATION = 2600; // ms，整段动画时长
            let startTime = null;

            /* ---- 缓动函数 ---- */
            function easeInOutQuart(t) {
                return t < 0.5
                    ? 8 * t * t * t * t
                    : 1 - Math.pow(-2 * t + 2, 4) / 2;
            }
            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            /* ---- 绘制iOS液态玻璃圆环 ----
             * r        : 圆环中心半径
             * ringW    : 圆环宽度
             * alpha    : 整体透明度 0-1
             * phase    : 波浪相位偏移（随时间递增产生流动感）
             */
            function drawGlassRing(r, ringW, alpha, phase) {
                if (r < 2) return;

                const SEG       = 256;           // 多边形分段数（越高越圆滑）
                const WAVE_FREQ = 9;             // 波浪周期数
                const WAVE_AMP  = Math.min(24, ringW * 0.38); // 波浪幅度

                // 生成外边/内边顶点
                const outer = [];
                const inner = [];
                for (let i = 0; i <= SEG; i++) {
                    const ang  = (i / SEG) * Math.PI * 2;
                    // 外圈波浪
                    const wO = WAVE_AMP * Math.sin(ang * WAVE_FREQ + phase);
                    // 内圈波浪（相位偏移，让内外边形成"液态厚度"变化）
                    const wI = WAVE_AMP * 0.55 * Math.sin(ang * WAVE_FREQ + phase + 1.1);

                    const rO = r + ringW * 0.5 + wO;
                    const rI = r - ringW * 0.5 + wI;

                    outer.push([cx + Math.cos(ang) * rO, cy + Math.sin(ang) * rO]);
                    inner.push([cx + Math.cos(ang) * rI, cy + Math.sin(ang) * rI]);
                }

                ctx.save();

                /* --- 1. 圆环填充：iOS磨砂玻璃渐变 --- */
                ctx.beginPath();
                outer.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
                ctx.closePath();
                // 内圈逆时针描边，形成镂空（偶-奇填充规则）
                [...inner].reverse().forEach(([x, y]) => ctx.lineTo(x, y));
                ctx.closePath();

                const rGrad = ctx.createRadialGradient(cx, cy, r - ringW * 0.5, cx, cy, r + ringW * 0.5);
                rGrad.addColorStop(0.00, `rgba(160, 210, 255, ${alpha * 0.06})`);
                rGrad.addColorStop(0.15, `rgba(215, 240, 255, ${alpha * 0.32})`);
                rGrad.addColorStop(0.38, `rgba(250, 255, 255, ${alpha * 0.62})`);
                rGrad.addColorStop(0.55, `rgba(200, 238, 255, ${alpha * 0.52})`);
                rGrad.addColorStop(0.78, `rgba(220, 242, 255, ${alpha * 0.28})`);
                rGrad.addColorStop(1.00, `rgba(170, 215, 255, ${alpha * 0.05})`);
                ctx.fillStyle   = rGrad;
                ctx.fill('evenodd');

                /* --- 2. 外边缘高光线（亮白） --- */
                ctx.beginPath();
                outer.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
                ctx.closePath();
                ctx.strokeStyle = `rgba(255, 255, 255, ${alpha * 0.88})`;
                ctx.lineWidth   = 1.6;
                ctx.stroke();

                /* --- 3. 内边缘柔光线（浅蓝白） --- */
                ctx.beginPath();
                inner.forEach(([x, y], i) => i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y));
                ctx.closePath();
                ctx.strokeStyle = `rgba(180, 230, 255, ${alpha * 0.52})`;
                ctx.lineWidth   = 1.0;
                ctx.stroke();

                /* --- 4. 棱镜色散：顶部弧段彩虹高光 --- */
                const prismaGrad = ctx.createLinearGradient(cx - r, cy - r, cx + r, cy - r);
                prismaGrad.addColorStop(0.00, `rgba(80, 200, 255, ${alpha * 0.55})`);
                prismaGrad.addColorStop(0.25, `rgba(180, 100, 255, ${alpha * 0.40})`);
                prismaGrad.addColorStop(0.50, `rgba(80, 255, 200, ${alpha * 0.50})`);
                prismaGrad.addColorStop(0.75, `rgba(255, 200, 80,  ${alpha * 0.40})`);
                prismaGrad.addColorStop(1.00, `rgba(80, 180, 255, ${alpha * 0.55})`);
                ctx.beginPath();
                ctx.arc(cx, cy, r + ringW * 0.5 + 1, -Math.PI * 0.72, -Math.PI * 0.28);
                ctx.strokeStyle = prismaGrad;
                ctx.lineWidth   = 3.5;
                ctx.stroke();

                /* --- 5. 镜面高光：左上方弧段 specular glint --- */
                const specAngleStart = -Math.PI * 0.88;
                const specAngleEnd   = -Math.PI * 0.58;
                const specGrad = ctx.createLinearGradient(
                    cx + Math.cos(specAngleStart) * r,
                    cy + Math.sin(specAngleStart) * r,
                    cx + Math.cos(specAngleEnd)   * r,
                    cy + Math.sin(specAngleEnd)   * r
                );
                specGrad.addColorStop(0,   `rgba(255,255,255,0)`);
                specGrad.addColorStop(0.5, `rgba(255,255,255,${alpha * 0.75})`);
                specGrad.addColorStop(1,   `rgba(255,255,255,0)`);
                ctx.beginPath();
                ctx.arc(cx, cy, r + ringW * 0.4, specAngleStart, specAngleEnd);
                ctx.strokeStyle = specGrad;
                ctx.lineWidth   = 4;
                ctx.stroke();

                /* --- 6. 内侧薄雾晕（圆环内边的柔光散射） --- */
                const innerGlow = ctx.createRadialGradient(cx, cy, r - ringW * 0.5, cx, cy, r - ringW * 0.1);
                innerGlow.addColorStop(0, `rgba(200, 235, 255, ${alpha * 0.20})`);
                innerGlow.addColorStop(1, `rgba(200, 235, 255, 0)`);
                ctx.beginPath();
                ctx.arc(cx, cy, r - ringW * 0.1, 0, Math.PI * 2);
                ctx.arc(cx, cy, r - ringW * 0.5, 0, Math.PI * 2, true);
                ctx.fillStyle = innerGlow;
                ctx.fill('evenodd');

                ctx.restore();
            }

            /* ---- 主动画帧 ---- */
            function frame(ts) {
                if (!startTime) startTime = ts;
                const elapsed = ts - startTime;
                const t       = Math.min(elapsed / DURATION, 1); // 线性进度 0→1
                const et      = easeInOutQuart(t);                // 缓动进度

                ctx.clearRect(0, 0, W, H);

                /* 主圆环当前半径（由 maxR 收缩至 0） */
                const mainR = maxR * (1 - et);

                /* ----
                 * 圆环内侧：覆盖雾气（白色磨砂区域随圆环收缩而收缩）
                 * 圆环外侧：透明（3D地图已经可见）
                 * ---- */
                const fogInnerR = Math.max(0, mainR - 42); // 雾气圆稍小于环内径，留出过渡
                if (fogInnerR > 1) {
                    const fogA = Math.min(1, 0.86 + 0.1 * Math.cos(elapsed * 0.003)); // 轻微呼吸感
                    const fogGrad = ctx.createRadialGradient(cx, cy, fogInnerR * 0.25, cx, cy, fogInnerR);
                    fogGrad.addColorStop(0.00, `rgba(205, 228, 255, ${fogA})`);
                    fogGrad.addColorStop(0.60, `rgba(218, 238, 255, ${fogA * 0.97})`);
                    fogGrad.addColorStop(0.85, `rgba(232, 246, 255, ${fogA * 0.88})`);
                    fogGrad.addColorStop(1.00, `rgba(245, 251, 255, ${fogA * 0.50})`);
                    ctx.beginPath();
                    ctx.arc(cx, cy, fogInnerR, 0, Math.PI * 2);
                    ctx.fillStyle = fogGrad;
                    ctx.fill();
                }

                /* ---- 主玻璃圆环 ---- */
                const ringW    = 52 + 16 * Math.sin(t * Math.PI * 2.8); // 宽度随动：收缩末段略微"鼓胀"
                const ringAlpha = t < 0.92
                    ? 0.94
                    : 0.94 * easeOutCubic(1 - (t - 0.92) / 0.08); // 最后淡出
                const phase    = elapsed * 0.0062; // 波浪流速

                if (mainR > 4) {
                    drawGlassRing(mainR, ringW, ringAlpha, phase);
                }

                /* ---- 拖尾回声环（3条，透明度递减） ---- */
                const echoParams = [
                    { tOffset: 0.11, alphaScale: 0.50, wScale: 0.48, phaseOff: 0.0  },
                    { tOffset: 0.23, alphaScale: 0.24, wScale: 0.30, phaseOff: 2.3  },
                    { tOffset: 0.38, alphaScale: 0.11, wScale: 0.18, phaseOff: 4.7  },
                ];
                echoParams.forEach(({ tOffset, alphaScale, wScale, phaseOff }) => {
                    const et2 = Math.min(t / (1 - tOffset), 1);
                    if (t <= tOffset) return;
                    const echoR  = maxR * (1 - easeInOutQuart(et2));
                    const echoA  = alphaScale * Math.sin(et2 * Math.PI);
                    if (echoR > 4 && echoA > 0.01) {
                        drawGlassRing(echoR, ringW * wScale, echoA, phase + phaseOff);
                    }
                });

                /* ---- 收尾光晕：圆环归零时中心一道柔光闪过 ---- */
                if (t > 0.86) {
                    const flashT  = easeOutCubic((t - 0.86) / 0.14);
                    const flashR  = Math.max(mainR + ringW * 0.8, 1);
                    const flashGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, flashR);
                    flashGrad.addColorStop(0.00, `rgba(230, 252, 255, ${flashT * 0.65})`);
                    flashGrad.addColorStop(0.35, `rgba(143, 200, 175, ${flashT * 0.30})`);
                    flashGrad.addColorStop(0.70, `rgba(80,  164, 134, ${flashT * 0.10})`);
                    flashGrad.addColorStop(1.00, `rgba(0,   0,   0,   0)`);
                    ctx.beginPath();
                    ctx.arc(cx, cy, flashR, 0, Math.PI * 2);
                    ctx.fillStyle = flashGrad;
                    ctx.fill();
                }

                if (t < 1) {
                    requestAnimationFrame(frame);
                } else {
                    // 动画结束：清空画布，画布淡出
                    ctx.clearRect(0, 0, W, H);
                    canvas.style.transition = 'opacity 0.35s ease';
                    canvas.style.opacity    = '0';
                }
            }

            requestAnimationFrame(frame);
        }

        /* ================================================================
         * 史诗级转场动画序列（修改：将原来的离云阶段替换为液态玻璃虹膜）
         * ================================================================ */
        document.getElementById('explore-btn').addEventListener('click', function () {
            const btn             = this;
            const introBg         = document.getElementById('intro-bg');
            const introOverlay    = document.getElementById('intro-overlay');
            const introScreen     = document.getElementById('intro-screen');
            const mainWrapper     = document.getElementById('main-wrapper');
            const cloudTransition = document.getElementById('cloud-transition');

            // 第 0 步：按钮反馈
            btn.innerText       = "风沙星辰";
            btn.style.animation = "none";
            setTimeout(() => {
                btn.classList.add('fade-out');
                introOverlay.classList.add('fade-out');
            }, 200);

            // 第 1 步：背景图开始放大（飞入亚洲）
            introBg.classList.add('zoom-into-asia');

            // 第 2 步 t=1300ms：进入云层（白色云雾放大铺满屏幕）
            setTimeout(() => {
                cloudTransition.classList.add('enter-clouds');
            }, 1300);

            // 第 3 步 t=2000ms：切换到主页面（云雾幕后已经准备好）
            setTimeout(() => {
                introScreen.style.display = 'none';
                mainWrapper.classList.add('active');
            }, 2000);

            // 第 4 步 t=2300ms：
            //   ① 先渲染3D地图（让地图在玻璃幕后就绪）
            //   ② 云雾快速淡出（0.45s）
            //   ③ 液态玻璃虹膜登场，由外向内收缩揭示地图
            setTimeout(() => {
                // 渲染地图（地图在液态玻璃层之下，动画过程中将被逐渐揭示）
                if (mapGeoReady) {
                    render3DMap();
                } else {
                    const waitForMap = setInterval(() => {
                        if (mapGeoReady) {
                            clearInterval(waitForMap);
                            render3DMap();
                        }
                    }, 200);
                }

                // 云雾快速淡出
                cloudTransition.classList.replace('enter-clouds', 'leave-clouds');

                // 200ms 后启动液态玻璃虹膜（和云雾淡出有短暂重叠，过渡更自然）
                setTimeout(() => {
                    playLiquidIrisClose();
                }, 200);

            }, 2300);
        });

        /* ================= 数据加载 ================= */
        async function loadTrips() {
            try {
                const response = await fetch('trips.json');
                if (!response.ok) throw new Error('无法读取数据文件');
                const data = await response.json();
                allTrips = data.trips; 
                
                renderCards();
                updateStats();

                const mapGeoJson = await fetch(
                    'https://cdn.jsdelivr.net/npm/echarts@5.5.0/node_modules/echarts/map/json/china.json'
                ).then(r => r.ok ? r.json() : null).catch(() => null);

                const geoData = mapGeoJson || await fetch(
                    'https://fastly.jsdelivr.net/npm/echarts@4.9.0/map/json/china.json'
                ).then(r => r.json());

                echarts.registerMap('china', geoData);
                mapGeoReady = true;

                const visitedNames = new Set();
                const provinceNames = ["北京", "天津", "上海", "重庆", "河北", "河南", "云南", "辽宁",
                    "黑龙江", "湖南", "安徽", "山东", "新疆", "江苏", "浙江", "江西", "湖北", "广西",
                    "甘肃", "山西", "内蒙古", "陕西", "吉林", "福建", "贵州", "广东", "青海", "西藏",
                    "四川", "宁夏", "海南", "台湾", "香港", "澳门"];
                
                allTrips.forEach(trip => {
                    let loc = trip.location.region;
                    for (let prov of provinceNames) {
                        if (loc.includes(prov)) visitedNames.add(prov);
                    }
                });

                visitedProvincesMapData = Array.from(visitedNames).map(name => ({
                    name: name,
                    value: 1,
                    regionHeight: 4,
                    itemStyle: {
                        color: '#8fa486',
                        opacity: 1,
                        borderWidth: 1,
                        borderColor: '#e8ece6'
                    }
                }));

            } catch (err) {
                console.error(err);
                document.getElementById('error-msg').innerHTML = `<p>加载失败: ${err.message}</p>`;
            }
        }

        /* ================= ECharts GL 3D 地形引擎 ================= */
        function render3DMap() {
            const container = document.getElementById('china-3d-map');
            if (!container) return;

            if (echartMap) {
                echartMap.dispose();
            }
            echartMap = echarts.init(container);

            const option = {
                series: [{
                    type: 'map3D',
                    map: 'china',
                    regionHeight: 1,
                    itemStyle: {
                        color: 'rgba(42, 50, 60, 0.8)',
                        opacity: 1,
                        borderWidth: 1,
                        borderColor: 'rgba(143, 164, 134, 0.3)'
                    },
                    shading: 'lambert',
                    light: {
                        main: {
                            intensity: 1.2,
                            shadow: true,
                            alpha: 40,
                            beta: -30
                        },
                        ambient: { intensity: 0.5 }
                    },
                    viewControl: {
                        projection: 'perspective',
                        autoRotate: true,
                        autoRotateSpeed: 4,
                        distance: 70,
                        alpha: 50,
                        beta: 5,
                        animationDurationUpdate: 2000,
                        animationEasingUpdate: 'cubicInOut'
                    },
                    emphasis: {
                        label: { show: false },
                        itemStyle: { color: 'rgba(143, 164, 134, 0.9)' }
                    },
                    label: { show: false },
                    data: visitedProvincesMapData
                }]
            };
            
            echartMap.setOption(option);
        }

        /* ================= 卡片渲染 ================= */
        function renderCards() {
            const grid = document.getElementById('trips-grid');
            grid.innerHTML = ''; 
            allTrips.forEach((trip, index) => {
                const card = document.createElement('div');
                card.className = 'trip-card';
                card.onclick = () => showTripDetail(index);
                card.innerHTML = `
                    <img src="${trip.cover_photo}" alt="${trip.name}" class="trip-image" onerror="this.src='https://via.placeholder.com/400x200/0b1120/8fa486?text=未找到图片'">
                    <div class="trip-content">
                        <div class="trip-meta">${trip.date} · ${trip.season}</div>
                        <h2 class="trip-title">${trip.name}</h2>
                        <div class="trip-stats">
                            <span><i class="fas fa-route"></i> ${trip.stats.distance_km}km</span>
                            <span><i class="fas fa-arrow-up"></i> ${trip.stats.elevation_gain_m}m</span>
                            <span><i class="fas fa-signal"></i> ${trip.stats.difficulty}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateStats() {
            document.getElementById('total-trips').innerText = allTrips.length;
            const totalKm = allTrips.reduce((sum, trip) => sum + trip.stats.distance_km, 0);
            document.getElementById('total-dist').innerText = totalKm.toFixed(1);
        }

        /* ================= 弹窗详情页 ================= */
        let myMap = null;
        function showTripDetail(index) {
            const trip = allTrips[index];
            const body = document.getElementById('modal-detail-body');
            const modal = document.getElementById('trip-modal');

            const photoGalleryHtml = trip.photos.map(p => `
                <div class="gallery-item">
                    <img src="${p.file}" class="gallery-img" onerror="this.src='https://via.placeholder.com/200x150/0b1120/94a3b8?text=图片丢失'">
                    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 5px;">${p.caption}</p>
                </div>
            `).join('');

            body.innerHTML = `
                <div style="border-bottom: 1px solid var(--border-glow); margin-bottom: 2rem; padding-bottom: 1rem;">
                    <h1 style="margin:0 0 10px 0; color:var(--text-main); font-size: 2rem;">${trip.name}</h1>
                    <p style="color:var(--text-muted); margin: 0; font-size: 0.95rem;">
                        <i class="fas fa-calendar-alt"></i> ${trip.date} &nbsp;&nbsp;|&nbsp;&nbsp;
                        <i class="fas fa-map-marker-alt"></i> ${trip.location.region}
                    </p>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 2rem;
                    background: rgba(255,255,255,0.02); padding: 20px; border-radius: 16px; border: 1px solid var(--border-glow);">
                    <div style="color: var(--text-main);"><strong style="color:var(--text-muted)">🔥 消耗</strong><br><span style="font-size:1.2rem">${trip.stats.calories_kcal}</span> kcal</div>
                    <div style="color: var(--text-main);"><strong style="color:var(--text-muted)">💓 心率</strong><br><span style="font-size:1.2rem">${trip.stats.avg_heart_rate_bpm}</span> bpm</div>
                    <div style="color: var(--text-main);"><strong style="color:var(--text-muted)">⏱️ 耗时</strong><br><span style="font-size:1.2rem">${trip.stats.duration_hours}</span> h</div>
                    <div style="color: var(--text-main);"><strong style="color:var(--text-muted)">⛰️ 爬升</strong><br><span style="font-size:1.2rem">${trip.stats.elevation_gain_m}</span> m</div>
                </div>
                <div class="hiking-note" style="line-height: 1.8; color: var(--text-main); margin-bottom: 2.5rem; font-size: 1.05rem;">
                    <h3 style="border-left: 4px solid var(--primary-green); padding-left: 12px; margin-bottom: 15px; font-weight:500;">心路历程</h3>
                    <p style="color: #cbd5e1;">${trip.note}</p>
                </div>
                <div class="hiking-photos" style="margin-bottom: 2.5rem;">
                    <h3 style="border-left: 4px solid var(--primary-green); padding-left: 12px; margin-bottom: 15px; font-weight:500;">精彩瞬间</h3>
                    <div class="photo-gallery">${photoGalleryHtml}</div>
                </div>
                <div class="hiking-map">
                    <h3 style="border-left: 4px solid var(--primary-green); padding-left: 12px; margin-bottom: 15px; font-weight:500;">路线足迹</h3>
                    <div id="real-map" style="height: 450px; width: 100%; border-radius: 16px; z-index: 1; border: 1px solid var(--border-glow);"></div>
                </div>
            `;

            modal.style.display = "block";
            document.body.style.overflow = "hidden"; 
            setTimeout(() => { modal.classList.add('show'); }, 10);
            if (myMap !== null) { myMap.remove(); }

            setTimeout(() => {
                myMap = L.map('real-map').setView([trip.location.coordinates.lat, trip.location.coordinates.lng], 13);
                L.tileLayer('https://webrd01.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                    attribution: '© 高德地图', maxZoom: 18
                }).addTo(myMap);

                if (trip.gpx_file) {
                    new L.GPX(trip.gpx_file, {
                        async: true,
                        marker_options: {
                            startIconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/pin-icon-start.png',
                            endIconUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/pin-icon-end.png',
                            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/pin-shadow.png'
                        },
                        polyline_options: {
                            color: '#3b82f6',
                            opacity: 0.9,
                            weight: 5,
                            lineCap: 'round'
                        }
                    }).on('loaded', function(e) { myMap.fitBounds(e.target.getBounds()); }).addTo(myMap);
                } else {
                    L.marker([trip.location.coordinates.lat, trip.location.coordinates.lng])
                        .addTo(myMap).bindPopup(trip.name).openPopup();
                }
            }, 300);
        }

        function closeModal() {
            const modal = document.getElementById('trip-modal');
            modal.classList.remove('show');
            setTimeout(() => { modal.style.display = "none"; document.body.style.overflow = "auto"; }, 300);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('trip-modal');
            if (event.target == modal) closeModal();
        }

        window.addEventListener('resize', () => {
            if (echartMap) echartMap.resize();
        });

        loadTrips();
    </script>
</body>
</html>
